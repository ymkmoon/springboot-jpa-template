server:
  port: 8001

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    write:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://dev-db-host:3306/YOUR_DATABASE?serverTimezone=Asia/Seoul&useSSL=false
      username: write_user
      password: write_password
      type: com.zaxxer.hikari.HikariDataSource

    read:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://dev-db-host:3306/YOUR_DATABASE?serverTimezone=Asia/Seoul&useSSL=false
      username: read_user
      password: read_password
      type: com.zaxxer.hikari.HikariDataSource

    hikari:
      maximum-pool-size: 500
      minimumIdle: 9
      idleTimeout: 10000
      connection-timeout: 10000
      validation-timeout: 10000
      maxLifetime: 30000
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false
    hibernate:
      ddl-auto: validate  # dev 환경에서는 validate 권장

  redis:
    host: dev-redis-host
    port: 6379

jwt:
  tokens:
    - group: AccessToken
      secretKey: acc_ess_tok_ens_ecr_et
      validity: 1800000  # 30분 (ms)
    - group: RefreshToken
      secretKey: ref_res_hto_ken_sec_ret
      validity: 259200000  # 3일 (ms)
